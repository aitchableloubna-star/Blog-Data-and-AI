<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Casanet</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { 
            --light-bg: #ffffff;
            --card-white: rgba(255, 255, 255, 0.85); /* Fond protecteur pour conteneurs */
            --border: rgba(0, 0, 0, 0.06);
            --accent-blue: #0062ff; /* Bleu royal intense */
            --text-dark: #000000; /* Noir pur */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            background-color: var(--light-bg);
            color: var(--text-dark); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            /* Voile blanc lumineux sur l'image de fond */
            background: linear-gradient(rgba(255, 255, 255, 0.65), rgba(255, 255, 255, 0.65)), 
                        url('image_a9345f.jpg');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }

        /* --- INTERACTIVE CURSOR FOLLOWER (VERSION CLAIRE) --- */
        .cursor-follower {
            width: 30px;
            height: 30px;
            background-color: rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 50%;
            position: fixed;
            pointer-events: none; 
            z-index: 9999;
            left: 0;
            top: 0;
            transform: translate(-50%, -50%);
            transition: transform 0.15s cubic-bezier(0.23, 1, 0.32, 1); 
        }

        /* NAVIGATION CLAIRE */
        .nav {
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            background: rgba(255, 255, 255, 0.4);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-img { height: 45px; width: auto; filter: brightness(1); }

        .nav-links { display: flex; gap: 30px; }
        .nav-links a { 
            color: var(--text-dark); text-decoration: none; font-weight: 700; font-size: 0.9rem; transition: 0.3s; opacity: 0.7;
        }
        .nav-links a:hover, .nav-links a.active { opacity: 1; color: var(--accent-blue); }

        /* MAIN LAYOUT */
        .main-container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            padding: 80px 8%;
            max-width: 1300px;
            margin: 0 auto;
            align-items: start;
        }

        /* LEFT SIDE: INFO */
        .info-side h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 40px;
            color: #002b80;
        }

        .info-side h1 span {
            color: var(--accent-blue);
        }

        .info-card {
            background: var(--card-white);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.03);
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .info-item:last-child { margin-bottom: 0; }
        .info-item i { color: var(--accent-blue); /* Icônes en bleu */ }
        .info-item p { font-size: 1.1rem; color: var(--text-dark); font-weight: 700; }

        /* RIGHT SIDE: FORM */
        .form-side {
            background: var(--card-white);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 50px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
        }

        .contact-form { display: flex; flex-direction: column; gap: 25px; }
        
        .form-group { display: flex; flex-direction: column; gap: 10px; }
        .form-group label { font-weight: 700; color: #002b80; font-size: 1rem; }
        
        .form-group input, .form-group textarea {
            background: #ffffff; /* Fond blanc pur pour la saisie */
            border: 1px solid rgba(0, 0, 0, 0.15);
            padding: 16px;
            border-radius: 15px;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 1rem;
            transition: 0.3s;
        }

        .form-group input::placeholder, .form-group textarea::placeholder {
            color: #94a3b8;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--accent-blue);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 98, 255, 0.08);
            outline: none;
        }

        .btn-send {
            background: #0062ff;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-send:hover {
            background: #0052d6;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 98, 255, 0.2);
        }

        /* RESPONSIVE */
        @media (max-width: 1000px) {
            .cursor-follower { display: none; }
            .main-container { grid-template-columns: 1fr; gap: 40px; padding: 40px 8%; }
            .info-side h1 { font-size: 2.5rem; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="cursor-follower"></div>

    <nav class="nav">
        <a href="index.html">
            <img src="image_9b1d74.jpg" alt="Casanet" class="logo-img">
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="blog.html">Blog</a>
            <a href="About.html">About</a>
            <a href="Contact.html" class="active">Contact</a>
        </div>
    </nav>

    <main class="main-container">
        
        <div class="info-side">
            <h1>Contactez <span>Casanet</span></h1>
            
            <div class="info-card">
                <div class="info-item">
                    <i data-lucide="map-pin"></i>
                    <p>Av. Annakhil, Immeuble Riad 1, Rabat</p>
                </div>
                <div class="info-item">
                    <i data-lucide="phone"></i>
                    <p>05 37 54 83 00</p>
                </div>
                <div class="info-item">
                    <i data-lucide="mail"></i>
                    <p>contact@casanet.ma</p>
                </div>
            </div>
        </div>

        <div class="form-side">
            <form class="contact-form" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" placeholder="Votre nom complet" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="votre@email.com" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="5" placeholder="Comment pouvons-nous vous aider ?" required></textarea>
                </div>
                <button type="submit" class="btn-send">Envoyer</button>
            </form>
        </div>

    </main>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Cursor Follower Logic
        const follower = document.querySelector('.cursor-follower');
        let mouseX = 0;
        let mouseY = 0;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            requestAnimationFrame(() => {
                follower.style.transform = `translate(${mouseX}px, ${mouseY}px) translate(-50%, -50%)`;
            });
        });
    </script>

</body>
</html>
