<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data & AI | CASANET</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #f8fafc; /* Fond de secours doux et clair */
            color: #0f172a; 
            overflow: hidden; 
        }

        /* --- INTERACTIVE CURSOR EFFECT --- */
        .cursor-follower {
            width: 30px;
            height: 30px;
            background-color: rgba(0, 98, 255, 0.08);
            border: 1px solid rgba(0, 98, 255, 0.3);
            border-radius: 50%;
            position: fixed;
            pointer-events: none; 
            z-index: 9999;
            left: 0;
            top: 0;
            transform: translate(-50%, -50%);
            transition: transform 0.15s cubic-bezier(0.23, 1, 0.32, 1); 
        }

        /* BACKGROUND HERO IMAGE */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('image.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Voile blanc général léger pour illuminer l'image */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.4); 
            z-index: 1;
        }

        /* NAVIGATION BAR */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 8%; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .logo-container {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo-img {
            height: 60px;
            width: auto;
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05);
        }

        .menu {
            display: flex;
            gap: 40px;
        }

        .menu a {
            color: #1e293b;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .menu a:hover {
            color: #0062ff;
        }

        /* --- BLOC CENTRAL CRÉATIF POUR UNE LISIBILITÉ MAXIMALE --- */
        .content-box {
            z-index: 10;
            background: rgba(255, 255, 255, 0.75); /* Cadre blanc semi-transparent */
            backdrop-filter: blur(20px); /* Floute l'image de fond uniquement derrière le texte */
            -webkit-backdrop-filter: blur(20px);
            padding: 60px 50px;
            border-radius: 24px;
            max-width: 850px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08); /* Ombre douce professionnelle */
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .content-box h1 {
            font-size: clamp(2.2rem, 6vw, 4.5rem); 
            font-weight: 900;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: -1px;
            /* Dégradé contrasté et net */
            background: linear-gradient(135deg, #004fe0, #00a2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .content-box p {
            font-size: clamp(1rem, 1.5vw, 1.25rem);
            color: #334155; /* Couleur sombre très lisible */
            line-height: 1.6;
            font-weight: 500;
            max-width: 700px;
            margin: 0 auto;
        }

        .btn {
            display: inline-block;
            margin-top: 35px;
            padding: 16px 45px;
            background: #0062ff; 
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0, 98, 255, 0.3);
        }

        .btn:hover {
            background: #0f172a; 
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.25);
        }

        @media (max-width: 768px) {
            .cursor-follower { display: none; }
            .content-box { padding: 40px 20px; }
        }

    </style>
</head>
<body>

    <div class="cursor-follower"></div>

    <section class="hero">
        <div class="overlay"></div>

        <nav class="navbar">
            <a href="index.html" class="logo-container">
                <img src="image_9b1d74.jpg" alt="Casanet Logo" class="logo-img">
            </a>
            
            <div class="menu">
                <a href="index.html">Home</a>
                <a href="blog.html">Blog</a>
                <a href="About.html">About</a>
                <a href="Contact.html">Contact</a>
            </div>
        </nav>

        <div class="content-box">
            <h1>DATA & AI</h1>
            <p>Solutions digitales innovantes pour transformer vos données en performance réelle.</p>
            <a href="blog.html" class="btn">Découvrir le Blog</a>
        </div>
    </section>

    <script>
        const follower = document.querySelector('.cursor-follower');
        let mouseX = 0;
        let mouseY = 0;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            requestAnimationFrame(() => {
                follower.style.transform = `translate(${mouseX}px, ${mouseY}px) translate(-50%, -50%)`;
            });
        });
    </script>

</body>
</html>
