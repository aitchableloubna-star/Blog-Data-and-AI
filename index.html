<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data & AI | CASANET</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #ffffff; /* Fond blanc lumineux */
            color: #0f172a; /* Texte sombre pour un contraste net */
            overflow: hidden; 
        }

        /* --- THE CURSOR FOLLOWER EFFECT (Adapté pour fond clair) --- */
        .cursor-follower {
            width: 30px;
            height: 30px;
            background-color: rgba(0, 98, 255, 0.08); /* Teinte bleue très légère */
            border: 1px solid rgba(0, 98, 255, 0.3);   /* Bordure bleue subtile */
            border-radius: 50%;
            position: fixed;
            pointer-events: none; 
            z-index: 9999;
            left: 0;
            top: 0;
            transform: translate(-50%, -50%);
            transition: transform 0.15s cubic-bezier(0.23, 1, 0.32, 1); 
        }

        /* IMAGE DE FOND ACCENTUÉE */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('image.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Voile blanc éclaircissant au lieu du noir */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.55); /* Illumine l'arrière-plan */
            z-index: 1;
        }

        /* NAVIGATION CLAIRE */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 8%; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(255, 255, 255, 0.3); /* Flou translucide blanc */
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        .logo-container {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo-img {
            height: 60px;
            width: auto;
            /* mix-blend-mode supprimé pour s'adapter parfaitement au fond blanc */
            filter: brightness(1);
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05);
        }

        .menu {
            display: flex;
            gap: 40px;
        }

        .menu a {
            color: #0f172a; /* Liens noirs */
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .menu a:hover {
            color: #0062ff; /* Accentuation bleue au survol */
        }

        /* CONTENU CENTRAL LUMINEUX */
        .content {
            text-align: center;
            z-index: 10;
            padding: 0 20px;
            width: 100%;
        }

        .content h1 {
            font-size: clamp(2rem, 8vw, 5.5rem); 
            font-weight: 900;
            margin-bottom: 20px;
            text-transform: uppercase;
            white-space: nowrap;
            /* Superbe dégradé de bleus technologiques et clairs */
            background: linear-gradient(to bottom, #0062ff, #4da6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 20px rgba(255,255,255,0.8));
        }

        .content p {
            font-size: clamp(0.9rem, 1.5vw, 1.2rem);
            max-width: 800px;
            margin: 0 auto;
            color: #334155; /* Gris anthracite très élégant et lisible */
            letter-spacing: 1px;
            font-weight: 500;
        }

        .btn {
            display: inline-block;
            margin-top: 40px;
            padding: 16px 40px;
            background: #0062ff; /* Bouton bleu royal pour ressortir sur le blanc */
            color: #ffffff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            box-shadow: 0 10px 25px rgba(0, 98, 255, 0.25);
        }

        .btn:hover {
            background: #0f172a; /* Passe au noir pur au survol */
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.25);
        }

        @media (max-width: 768px) {
            .cursor-follower { display: none; }
        }

    </style>
</head>
<body>

    <div class="cursor-follower"></div>

    <section class="hero">
        <div class="overlay"></div>

        <nav class="navbar">
            <a href="index.html" class="logo-container">
                <img src="image_9b1d74.jpg" alt="Casanet Logo" class="logo-img">
            </a>
            
            <div class="menu">
                <a href="index.html">Home</a>
                <a href="blog.html">Blog</a>
                <a href="About.html">About</a>
                <a href="Contact.html">Contact</a>
            </div>
        </nav>

        <div class="content">
            <h1>DATA & AI</h1>
            <p>Solutions digitales innovantes pour transformer vos données en performance réelle.</p>
            <a href="blog.html" class="btn">Découvrir le Blog</a>
        </div>
    </section>

    <script>
        const follower = document.querySelector('.cursor-follower');
        let mouseX = 0;
        let mouseY = 0;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            requestAnimationFrame(() => {
                follower.style.transform = `translate(${mouseX}px, ${mouseY}px) translate(-50%, -50%)`;
            });
        });
    </script>

</body>
</html>
